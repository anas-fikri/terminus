name: Build Terminus Multi-OS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: terminus-linux
            artifact_glob: |
              apps/terminus-tauri/src-tauri/target/release/bundle/deb/*.deb
              apps/terminus-tauri/src-tauri/target/release/bundle/appimage/*.AppImage
              apps/terminus-tauri/src-tauri/target/release/bundle/rpm/*.rpm
          - os: windows-latest
            artifact_name: terminus-windows
            artifact_glob: |
              apps/terminus-tauri/src-tauri/target/release/bundle/msi/*.msi
              apps/terminus-tauri/src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            artifact_name: terminus-macos
            artifact_glob: |
              apps/terminus-tauri/src-tauri/target/release/bundle/dmg/*.dmg
              apps/terminus-tauri/src-tauri/target/release/bundle/macos/*.app

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/terminus-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: apps/terminus-tauri
        run: npm ci

      - name: Build Tauri app bundle
        working-directory: apps/terminus-tauri
        run: npm run tauri -- build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
